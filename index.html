<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="page_title">اللينك في البايو</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Language Switcher -->
    <div class="language-switcher">
        <button id="lang-ar" class="lang-btn active" onclick="switchLanguage('ar')">العربية</button>
        <button id="lang-en" class="lang-btn" onclick="switchLanguage('en')">English</button>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Profile Section -->
        <div class="profile-section">
            <div class="profile-image">
                <img id="profile-img" src="https://via.placeholder.com/120/4CAF50/FFFFFF?text=👤" alt="Profile Picture">
            </div>
            <h1 class="profile-name" data-translate="default_name">اسمك هنا</h1>
            <p class="profile-bio" data-translate="default_bio">أضف نبذة عنك هنا</p>
        </div>

        <!-- Links Section -->
        <div class="links-section">
            <h2 data-translate="links_title">الروابط</h2>
            <div class="links-container" id="links-container">
                <!-- Default links -->
                <a href="#" class="link-item" data-translate="sample_link_1">موقعي الشخصي</a>
                <a href="#" class="link-item" data-translate="sample_link_2">حسابي على تويتر</a>
                <a href="#" class="link-item" data-translate="sample_link_3">قناتي على يوتيوب</a>
                <a href="#" class="link-item" data-translate="sample_link_4">صفحتي على لينكد إن</a>
            </div>
        </div>

        <!-- Add Link Button -->
        <button class="add-link-btn" onclick="addNewLink()" data-translate="add_link">إضافة رابط جديد</button>

        <!-- Customization Panel -->
        <div class="customization-panel">
            <h3 data-translate="customize_title">تخصيص الصفحة</h3>
            
            <!-- Profile Customization -->
            <div class="custom-section">
                <label data-translate="name_label">الاسم:</label>
                <input type="text" id="name-input" data-translate="name_placeholder" placeholder="أدخل اسمك">
            </div>
            
            <div class="custom-section">
                <label data-translate="bio_label">النبذة:</label>
                <textarea id="bio-input" data-translate="bio_placeholder" placeholder="أدخل نبذة عنك"></textarea>
            </div>
            
            <div class="custom-section">
                <label data-translate="image_label">رابط الصورة:</label>
                <input type="url" id="image-input" data-translate="image_placeholder" placeholder="أدخل رابط الصورة">
            </div>

            <!-- Theme Selection -->
            <div class="custom-section">
                <label data-translate="theme_label">المظهر:</label>
                <select id="theme-select">
                    <option value="default" data-translate="theme_default">افتراضي</option>
                    <option value="dark" data-translate="theme_dark">داكن</option>
                    <option value="colorful" data-translate="theme_colorful">ملون</option>
                </select>
            </div>

            <button class="save-btn" onclick="saveChanges()" data-translate="save_changes">حفظ التغييرات</button>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p data-translate="footer_text">مدعوم بـ <strong>فِ البايو</strong> - البديل المجاني لخدمات الروابط</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
